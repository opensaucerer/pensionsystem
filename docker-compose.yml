version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pension_sql_db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "SA", "-P", "YourStrong@Passw0rd", "-Q", "SELECT 1", "-No" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: PensionSystem.API/Dockerfile
    container_name: pension_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=PensionDb;User Id=SA;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  sql_data:
    name: pension_sql_data
